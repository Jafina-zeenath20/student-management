{% extends "base.html" %}
{% block content %}

<section class="section-heading">
    <div>
        <h2>Mark Attendance</h2>
        <p>Select the attendance status for each student and save your updates.</p>
    </div>
</section>

<div class="form-card">
    {% if message %}
    <div class="alert alert-success">{{ message }}</div>
    {% endif %}

    <div class="form-grid" style="margin-bottom: 20px;">
        <label>
            Select Date
            <input type="date" id="attendance_date" value="{{ selected_date }}" onchange="updateDateParam()">
        </label>
    </div>

    <form method="post" id="attendance_form">
        <table class="responsive-table">
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Grade</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s.name }}</td>
                    <td>{{ s.grade }}</td>
                    <td>
                        <select name="student_{{ s.id }}">
                            <option value="Present">Present</option>
                            <option value="Absent">Absent</option>
                            <option value="Late">Late</option>
                        </select>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Attendance</button>
        </div>
        <input type="hidden" name="selected_date" id="selected_date_input" value="{{ selected_date }}">
    </form>
</div>

<script>
function updateDateParam() {
    const dateInput = document.getElementById("attendance_date");
    document.getElementById("selected_date_input").value = dateInput.value;
    const form = document.getElementById("attendance_form");
    const action = form.action || "/attendance";
    form.action = action + "?selected_date=" + dateInput.value;
}
</script>

{% endblock %}

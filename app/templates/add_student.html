{% extends "base.html" %}
{% block content %}

<section class="section-heading">
    <div>
        <h2>Add New Student</h2>
        <p>Enter student details and assign the correct centre and staff member.</p>
    </div>
</section>

<div class="form-card">
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="form-grid">
        <label>
            Name
            <input name="name" required placeholder="Enter full name">
        </label>

        <label>
            Grade
            <input name="grade" required placeholder="e.g. 10">
        </label>

        <label>
            Parent Contact
            <input name="parent_contact" type="tel" required placeholder="e.g. 999-1234">
        </label>

        <label>
            Centre
            <select name="centre_id" id="centre" onchange="loadStaff()" required>
                {% for c in centres %}
                <option value="{{ c.id }}" {% if selected_centre == c.id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </label>

        <label>
            Staff
            <select name="staff_id" id="staff" required></select>
        </label>

        <button type="submit" class="btn btn-primary">Save Student</button>
    </form>
</div>

<script>
const selectedStaff = {{ selected_staff | tojson }};

async function loadStaff() {
    const centre = document.getElementById("centre").value;
    const response = await fetch(`/staff/${centre}`);
    const data = await response.json();

    const staff = document.getElementById("staff");
    staff.innerHTML = "";

    if (!data.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "No staff available";
        option.disabled = true;
        option.selected = true;
        staff.appendChild(option);
        return;
    }

    data.forEach(item => {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = item.name;
        if (selectedStaff === item.id) {
            option.selected = true;
        }
        staff.appendChild(option);
    });
}

loadStaff();
</script>

{% endblock %}

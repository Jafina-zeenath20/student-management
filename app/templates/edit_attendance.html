{% extends "base.html" %}
{% block content %}

<section class="section-heading">
    <div>
        <h2>Edit Attendance</h2>
        <p>Update attendance status for {{ student.name }} on {{ selected_date }}</p>
    </div>
</section>

<div class="form-card">
    <form method="post" class="form-grid">
        <label>
            Student Name
            <input type="text" value="{{ student.name }}" disabled>
        </label>

        <label>
            Grade
            <input type="text" value="{{ student.grade }}" disabled>
        </label>

        <label>
            Centre
            <input type="text" value="{{ student.centre.name if student.centre else '—' }}" disabled>
        </label>

        <label>
            Staff
            <input type="text" value="{{ student.staff.name if student.staff else '—' }}" disabled>
        </label>

        <label>
            Date
            <input type="date" value="{{ selected_date }}" disabled>
        </label>

        <label>
            Attendance Status
            <select name="status" required>
                <option value="Present" {% if current_status == 'Present' %}selected{% endif %}>Present</option>
                <option value="Absent" {% if current_status == 'Absent' %}selected{% endif %}>Absent</option>
                <option value="Late" {% if current_status == 'Late' %}selected{% endif %}>Late</option>
            </select>
        </label>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Attendance</button>
            <a href="/view-attendance?selected_date={{ selected_date }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
